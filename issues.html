<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="app-body">
    <header class="app-header">
      <div class="brand-wrap">
        <img src="assets/github-logo.png" alt="Logo" class="brand-logo" />
        <div>
          <h1 class="brand-title">GitHub Issues Tracker</h1>
        
        </div>
      </div>

      <div class="header-actions">
        <form id="search-form" class="search-form">
          <input
            id="search-input"
            type="text"
            class="text-input search-input"
            placeholder="Search issues..."
          />
          <button type="submit" class="primary-btn search-btn">Search</button>
        </form>
        <button id="logout-btn" type="button" class="ghost-btn">Logout</button>
      </div>
    </header>

    <main class="app-main">
      <section class="tab-panel">
        <div class="tabs-row">
          <button type="button" class="tab-btn is-active" data-tab="all">All</button>
          <button type="button" class="tab-btn" data-tab="open">Open</button>
          <button type="button" class="tab-btn" data-tab="closed">Closed</button>
        </div>

        <div class="summary-row">
          <div class="summary-left">
            <img src="assets/Aperture.png" alt="" class="summary-icon" />
            <p id="summary-text">0 issues for selected filter</p>
          </div>

          <div class="summary-right">
            <div class="status-chip">
              <img src="assets/Open-Status.png" alt="" />
              <span id="open-count">0 Open</span>
            </div>
            <div class="status-chip">
              <img src="assets/closed-status.png" alt="" />
              <span id="closed-count">0 Closed</span>
            </div>
          </div>
        </div>
      </section>

      <section class="cards-shell">
        <div id="loading-state" class="loading-state hidden">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading issues...</p>
        </div>

        <div id="issues-grid" class="issues-grid" aria-live="polite"></div>
        <p id="empty-state" class="empty-state hidden">
          No issues found for the selected filter.
        </p>
      </section>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button id="modal-close" class="modal-close-btn" aria-label="Close modal">x</button>
        <div id="modal-content" class="modal-content"></div>
      </div>
    </div>

    <script src="js/issues.js"></script>
  </body>
</html>
