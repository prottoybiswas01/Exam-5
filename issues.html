<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="app-body">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand-wrap">
          <img src="assets/github-logo.png" alt="Logo" class="brand-logo" />
          <div>
            <h1 class="brand-title">GitHub Issues Tracker</h1>
          </div>
        </div>

        <form id="search-form" class="search-form" role="search">
          <label class="sr-only" for="search-input">Search issues</label>
          <div class="search-field">
            <span class="search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8" />
                <path
                  d="M16 16L20 20"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <input
              id="search-input"
              type="text"
              class="text-input search-input"
              placeholder="Search issues..."
            />
          </div>
          <button type="submit" class="primary-btn search-btn">Search</button>
        </form>
      </div>
    </header>

    <main class="app-main">
      <section class="tab-panel">
        <div class="tabs-row">
          <button type="button" class="tab-btn is-active" data-tab="all">All</button>
          <button type="button" class="tab-btn" data-tab="open">Open</button>
          <button type="button" class="tab-btn" data-tab="closed">Closed</button>
        </div>
      </section>

      <section class="issue-shell">
        <div class="summary-row">
          <div class="summary-left">
            <div class="summary-icon-wrap">
              <img src="assets/Aperture.png" alt="" class="summary-icon" />
            </div>
            <div class="summary-copy">
              <p id="summary-total" class="summary-total">0 Issues</p>
              <p id="summary-description" class="summary-description">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="summary-right">
            <div class="status-chip">
              <span class="status-dot status-dot-open" aria-hidden="true"></span>
              <span id="open-count">0 Open</span>
            </div>
            <div class="status-chip">
              <span class="status-dot status-dot-closed" aria-hidden="true"></span>
              <span id="closed-count">0 Closed</span>
            </div>
          </div>
        </div>

        <div id="loading-state" class="loading-state hidden">
          <div class="spinner" aria-hidden="true"></div>
          <p>Loading issues...</p>
        </div>

        <div id="issues-grid" class="issues-grid" aria-live="polite"></div>
        <p id="empty-state" class="empty-state hidden">
          No issues found for the selected filter.
        </p>
      </section>
    </main>

    <div
      id="modal-overlay"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-card">
        <button id="modal-close" type="button" class="modal-close-btn" aria-label="Close modal">
          &times;
        </button>
        <div id="modal-content" class="modal-content"></div>
      </div>
    </div>

    <script src="js/issues.js"></script>
  </body>
</html>
