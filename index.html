<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="login-body">
    <main class="auth-wrapper">
      <section class="auth-card">
        <img
          src="assets/github-logo.png"
          alt="GitHub Issues Tracker Logo"
          class="auth-logo"
        />
        <h1 class="auth-title">GitHub Issues Tracker</h1>
        <p class="auth-subtitle">Sign in to monitor and review repository issues</p>

        <form id="login-form" class="auth-form" novalidate>
          <label class="field-label" for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            class="text-input"
            placeholder="Enter username"
            required
          />

          <label class="field-label" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="text-input"
            placeholder="Enter password"
            required
          />

          <button type="submit" class="primary-btn">Sign In</button>
          <p class="auth-error" id="auth-error" aria-live="polite"></p>
        </form>

        <div class="demo-credentials">
          <p>Demo Credential</p>
          <p><strong>Username:</strong> <span id="demo-username">admin</span></p>
          <p><strong>Password:</strong> <span id="demo-password">admin123</span></p>
        </div>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
